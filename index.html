<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="pf" id="pf">
  <div id="slides"></div>

  <div class="pf-top">
    <!--
      CHANGE "Your Name" below to your actual name or logo text.
      You can also replace this with an <img> tag pointing to your logo file.
    -->
    <div class="pf-logo">Your Name</div>
    <nav class="pf-topnav">
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </div>

  <div class="pf-bottom">
    <div class="pf-info">
      <div class="pf-counter" id="counter">01 / 06</div>
      <div class="pf-title" id="slide-title" onclick="openModal()"></div>
      <div class="pf-short" id="slide-short"></div>
      <div class="pf-tags" id="slide-tags"></div>
    </div>
    <div class="pf-right">
      <button class="pf-view" onclick="openModal()">View Project &rarr;</button>
      <div class="pf-arrows">
        <button class="pf-btn" onclick="go(-1)">&#8592;</button>
        <button class="pf-btn" onclick="go(1)">&#8594;</button>
      </div>
      <div class="pf-dots" id="dots"></div>
    </div>
  </div>

  <div class="pf-progress" id="progress"></div>

  <div class="mwrap" id="mwrap">
    <div class="mbox">
      <button class="mclose" onclick="closeModal()">&#215;</button>
      <div class="mhero" id="mhero"><span class="mhero-cat">Project Overview</span></div>
      <div class="mbody">
        <div class="mmeta">
          <span class="myear" id="myear"></span>
          <span class="mstat" id="mstat"></span>
        </div>
        <div class="mtitle" id="mtitle"></div>
        <div class="mdesc" id="mdesc"></div>
        <div class="mtags" id="mtags"></div>
        <div class="macts" id="macts"></div>
      </div>
    </div>
  </div>
</div>

<script>
/*
  ================================================================
  HOW TO EDIT YOUR PROJECTS
  ================================================================
  Each project below has these fields:

  title      — The big headline name of your project
  short      — One sentence shown on the slideshow
  desc       — Longer description shown in the popup modal
  tags       — Tech/skills used (shows first 3 on slide, all in modal)
  year       — Year completed
  status     — "live", "wip" (in progress), or "archived"
  bg         — Background color of the slide (dark hex color)
  live       — URL to the live project. Use null if none.
  github     — URL to GitHub repo. Use null if none.
  image      — Path to a background image (optional).
               Example: "images/project1.jpg"
               Leave as null to use only the bg color.

  TO ADD YOUR OWN IMAGES:
  1. Create a folder called "images" next to this HTML file
  2. Put your project photos in that folder
  3. Set the image field to "images/your-photo.jpg"
  ================================================================
*/
const projects = [
  {
    title: "E-Commerce Dashboard",
    short: "Real-time analytics and inventory tracking for an online retail platform.",
    desc: "A full-stack analytics dashboard for a mid-size e-commerce company. Features real-time inventory alerts, revenue forecasting, and a customer drop-off heatmap. Cut order processing time by 34%.",
    tags: ["React", "Node.js", "PostgreSQL", "D3.js"],
    year: "2025",
    status: "live",
    bg: "#3a2e26",
    image: null,
    live: "https://yourproject.com",
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Design System",
    short: "Component library and token system spanning three products.",
    desc: "80+ components, full token architecture covering spacing, color, and typography, plus a Figma integration pipeline. Reduced UI inconsistencies across the product suite by 60% within one quarter.",
    tags: ["TypeScript", "Storybook", "Figma", "CSS Custom Properties"],
    year: "2024",
    status: "live",
    bg: "#2e2b25",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "AI Writing Assistant",
    short: "Browser extension that brings AI writing into any text field.",
    desc: "A Chrome extension injecting a contextual AI assistant into any textarea on the web. Supports tone adjustment, grammar fixing, and smart completions. Reached 2,000 active weekly users within two months.",
    tags: ["JavaScript", "Chrome API", "OpenAI", "Tailwind"],
    year: "2024",
    status: "live",
    bg: "#2c3028",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Real-time Collab Tool",
    short: "Infinite canvas whiteboard with live cursors and voice chat.",
    desc: "Collaborative canvas built with WebSockets and CRDT-based state sync. Supports freehand drawing, sticky notes, shapes, and live cursors for up to 20 concurrent users, plus WebRTC voice.",
    tags: ["WebSockets", "CRDT", "WebRTC", "Canvas API"],
    year: "2025",
    status: "wip",
    bg: "#35302a",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Personal Finance App",
    short: "Mobile-first budgeting with smart categorization and insights.",
    desc: "React Native app pulling bank transactions via Plaid, auto-categorizing spending using a lightweight ML model trained on 500k labeled transactions, with drill-down monthly trend charts.",
    tags: ["React Native", "Plaid API", "TensorFlow Lite", "SQLite"],
    year: "2023",
    status: "archived",
    bg: "#302d2b",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Open Source CLI",
    short: "Scaffold full-stack projects with a single command line.",
    desc: "A Node.js CLI generating opinionated full-stack project scaffolds. Supports React, Vue, and Svelte frontends paired with Express or Fastify backends. Over 1,200 GitHub stars.",
    tags: ["Node.js", "CLI", "Yargs", "Handlebars"],
    year: "2024",
    status: "live",
    bg: "#2a2e26",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  }
];

/* ---- Don't need to edit below this line ---- */
const sLabel = { live: "Live", wip: "In Progress", archived: "Archived" };
const sCls   = { live: "sl",   wip: "sw",          archived: "sa" };
let cur = 0, paused = false, startTime = null, interval = 5500;

function buildSlides() {
  const sc = document.getElementById('slides');
  const dc = document.getElementById('dots');
  projects.forEach((p, i) => {
    const s = document.createElement('div');
    s.className = 'pf-slide' + (i === 0 ? ' active' : '');
    const bgStyle = p.image
      ? `background-color:${p.bg};background-image:url('${p.image}')`
      : `background-color:${p.bg}`;
    s.innerHTML = `<div class="pf-bg" style="${bgStyle}"></div><div class="pf-scrim"></div>`;
    sc.appendChild(s);
    const d = document.createElement('div');
    d.className = 'pf-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i);
    dc.appendChild(d);
  });
}

function updateUI() {
  const p = projects[cur];
  document.getElementById('counter').textContent =
    String(cur + 1).padStart(2, '0') + ' / ' + String(projects.length).padStart(2, '0');
  document.getElementById('slide-title').textContent = p.title;
  document.getElementById('slide-short').textContent = p.short;
  document.getElementById('slide-tags').innerHTML =
    p.tags.slice(0, 3).map(t => `<span class="pf-tag">${t}</span>`).join('');
  document.querySelectorAll('.pf-dot').forEach((d, i) => d.classList.toggle('active', i === cur));
  document.querySelectorAll('.pf-slide').forEach((s, i) => s.classList.toggle('active', i === cur));
}

function goTo(n) { cur = (n + projects.length) % projects.length; updateUI(); startTime = null; }
function go(d)   { goTo(cur + d); }

function openModal() {
  const p = projects[cur];
  paused = true;
  const hero = document.getElementById('mhero');
  hero.style.background = p.image ? `url('${p.image}') center/cover` : p.bg;
  document.getElementById('myear').textContent = p.year;
  const ms = document.getElementById('mstat');
  ms.textContent = sLabel[p.status];
  ms.className = 'mstat ' + sCls[p.status];
  document.getElementById('mtitle').textContent = p.title;
  document.getElementById('mdesc').textContent = p.desc;
  document.getElementById('mtags').innerHTML = p.tags.map(t => `<span class="pf-tag">${t}</span>`).join('');
  const ma = document.getElementById('macts');
  ma.innerHTML = '';
  if (p.live) {
    const a = document.createElement('a');
    a.href = p.live; a.target = '_blank';
    a.className = 'mabtn mbtn-p'; a.textContent = 'View Live';
    ma.appendChild(a);
  }
  if (p.github) {
    const a = document.createElement('a');
    a.href = p.github; a.target = '_blank';
    a.className = 'mabtn mbtn-g'; a.textContent = 'GitHub';
    ma.appendChild(a);
  }
  document.getElementById('mwrap').classList.add('open');
}

function closeModal() {
  document.getElementById('mwrap').classList.remove('open');
  paused = false;
  startTime = null;
}

document.getElementById('mwrap').addEventListener('click', e => {
  if (e.target === document.getElementById('mwrap')) closeModal();
});

function tick(ts) {
  if (!startTime) startTime = ts;
  if (!paused) {
    const el = ts - startTime;
    document.getElementById('progress').style.width = Math.min(el / interval * 100, 100) + '%';
    if (el >= interval) { go(1); startTime = ts; }
  }
  requestAnimationFrame(tick);
}

buildSlides();
updateUI();
requestAnimationFrame(tick);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'Escape')     closeModal();
});
</script>
</body>
</html>
