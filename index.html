<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="pf" id="pf">
  <div id="slides"></div>

  <div class="pf-top">
    <!--
      CHANGE "Your Name" below to your actual name or logo text.
      You can also replace this with an <img> tag pointing to your logo file.
    -->
    <div class="pf-logo">Emma Baum</div>
    <nav class="pf-topnav">
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </div>

  <div class="pf-bottom">
    <div class="pf-info">
      <div class="pf-counter" id="counter">01 / 06</div>
      <div class="pf-title" id="slide-title" onclick="openModal()"></div>
      <div class="pf-short" id="slide-short"></div>
      <div class="pf-tags" id="slide-tags"></div>
    </div>
    <div class="pf-right">
      <button class="pf-view" onclick="openModal()">View Project &rarr;</button>
      <div class="pf-arrows">
        <button class="pf-btn" onclick="go(-1)">&#8592;</button>
        <button class="pf-btn" onclick="go(1)">&#8594;</button>
      </div>
      <div class="pf-dots" id="dots"></div>
    </div>
  </div>

  <div class="pf-progress" id="progress"></div>

  <div class="mwrap" id="mwrap">
    <div class="mbox">
      <button class="mclose" onclick="closeModal()">&#215;</button>
      <div class="mhero" id="mhero"><span class="mhero-cat">Project Overview</span></div>
      <div class="mbody">
        <div class="mmeta">
          <span class="myear" id="myear"></span>
          <span class="mstat" id="mstat"></span>
        </div>
        <div class="mtitle" id="mtitle"></div>
        <div class="mdesc" id="mdesc"></div>
        <div class="mtags" id="mtags"></div>
        <div class="macts" id="macts"></div>
      </div>
    </div>
  </div>
</div>

<script>
/*
  ================================================================
  HOW TO EDIT YOUR PROJECTS
  ================================================================
  Each project below has these fields:

  title      — The big headline name of your project
  short      — One sentence shown on the slideshow
  desc       — Longer description shown in the popup modal
  tags       — Tech/skills used (shows first 3 on slide, all in modal)
  year       — Year completed
  status     — "live", "wip" (in progress), or "archived"
  bg         — Background color of the slide (dark hex color)
  live       — URL to the live project. Use null if none.
  github     — URL to GitHub repo. Use null if none.
  image      — Path to a background image (optional).
               Example: "images/project1.jpg"
               Leave as null to use only the bg color.

  TO ADD YOUR OWN IMAGES:
  1. Create a folder called "images" next to this HTML file
  2. Put your project photos in that folder
  3. Set the image field to "images/your-photo.jpg"
  ================================================================
*/
const projects = [
  {
    title: "E-Commerce Dashboard",
    short: "Real-time analytics and inventory tracking for an online retail platform.",
    desc: "A comprehensive full-stack analytics dashboard developed for a mid-size e-commerce company. This project features real-time inventory alerts, advanced revenue forecasting using machine learning algorithms, and an interactive customer drop-off heatmap. The dashboard integrates with multiple sales channels and provides actionable insights that helped cut order processing time by 34%. Built with React for the frontend, Node.js for the backend, PostgreSQL for data storage, and D3.js for data visualization.",
    tags: ["React", "Node.js", "PostgreSQL", "D3.js"],
    year: "2025",
    status: "live",
    bg: "#3a2e26",
    image: "https://via.placeholder.com/800x600/3a2e26/ffffff?text=E-Commerce+Dashboard",
    live: "https://yourproject.com",
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Design System",
    short: "Component library and token system spanning three products.",
    desc: "A robust design system comprising over 80 reusable components, a comprehensive token architecture covering spacing, color palettes, and typography scales, along with a seamless Figma integration pipeline. This system ensures consistency across three major product lines, reducing UI inconsistencies by 60% within one quarter. Developed using TypeScript for type safety, Storybook for component documentation, Figma for design collaboration, and CSS Custom Properties for theming.",
    tags: ["TypeScript", "Storybook", "Figma", "CSS Custom Properties"],
    year: "2024",
    status: "live",
    bg: "#2e2b25",
    image: "https://via.placeholder.com/800x600/2e2b25/ffffff?text=Design+System",
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "AI Writing Assistant",
    short: "Browser extension that brings AI writing into any text field.",
    desc: "An innovative Chrome extension that seamlessly injects a contextual AI writing assistant into any textarea across the web. Features include intelligent tone adjustment, advanced grammar and style fixing, smart text completions, and plagiarism detection. The extension reached 2,000 active weekly users within two months of launch. Built with vanilla JavaScript for the extension logic, Chrome Extension APIs for browser integration, OpenAI's API for AI capabilities, and Tailwind CSS for styling.",
    tags: ["JavaScript", "Chrome API", "OpenAI", "Tailwind"],
    year: "2024",
    status: "live",
    bg: "#2c3028",
    image: "https://via.placeholder.com/800x600/2c3028/ffffff?text=AI+Writing+Assistant",
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Real-time Collab Tool",
    short: "Infinite canvas whiteboard with live cursors and voice chat.",
    desc: "A powerful collaborative whiteboard application featuring an infinite canvas, real-time synchronization using WebSockets and Conflict-free Replicated Data Types (CRDT), support for freehand drawing, sticky notes, geometric shapes, and live cursors for up to 20 concurrent users. Includes WebRTC-powered voice chat for seamless communication. This tool enables remote teams to brainstorm and collaborate effectively. Developed with WebSockets for real-time communication, CRDT for conflict resolution, WebRTC for peer-to-peer audio, and HTML5 Canvas API for drawing functionality.",
    tags: ["WebSockets", "CRDT", "WebRTC", "Canvas API"],
    year: "2025",
    status: "wip",
    bg: "#35302a",
    image: "https://via.placeholder.com/800x600/35302a/ffffff?text=Real-time+Collab+Tool",
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Personal Finance App",
    short: "Mobile-first budgeting with smart categorization and insights.",
    desc: "A user-friendly mobile application for personal finance management, built with React Native. The app securely pulls bank transactions via Plaid API, automatically categorizes spending using a lightweight machine learning model trained on 500,000 labeled transactions, and provides drill-down monthly trend charts and budgeting insights. Features include expense tracking, budget setting, financial goal planning, and personalized spending recommendations. Uses React Native for cross-platform development, Plaid API for bank integration, TensorFlow Lite for on-device ML inference, and SQLite for local data storage.",
    tags: ["React Native", "Plaid API", "TensorFlow Lite", "SQLite"],
    year: "2023",
    status: "archived",
    bg: "#302d2b",
    image: "https://via.placeholder.com/800x600/302d2b/ffffff?text=Personal+Finance+App",
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Open Source CLI",
    short: "Scaffold full-stack projects with a single command line.",
    desc: "A versatile Node.js command-line interface tool that generates opinionated full-stack project scaffolds with a single command. Supports popular frontend frameworks like React, Vue, and Svelte, paired with backend options including Express and Fastify. The tool includes boilerplate code, folder structure, configuration files, and best practices setup. It has garnered over 1,200 GitHub stars and is actively maintained by the community. Built with Node.js for the runtime, Yargs for command-line parsing, Handlebars for template rendering, and includes integration with various build tools and testing frameworks.",
    tags: ["Node.js", "CLI", "Yargs", "Handlebars"],
    year: "2024",
    status: "live",
    bg: "#2a2e26",
    image: "https://via.placeholder.com/800x600/2a2e26/ffffff?text=Open+Source+CLI",
    live: null,
    github: "https://github.com/yourusername/project"
  }
];

/* ---- Don't need to edit below this line ---- */
const sLabel = { live: "Live", wip: "In Progress", archived: "Archived" };
const sCls   = { live: "sl",   wip: "sw",          archived: "sa" };
let cur = 0, paused = false, startTime = null, interval = 5500;

function buildSlides() {
  const sc = document.getElementById('slides');
  const dc = document.getElementById('dots');
  projects.forEach((p, i) => {
    const s = document.createElement('div');
    s.className = 'pf-slide' + (i === 0 ? ' active' : '');
    const bgStyle = p.image
      ? `background-color:${p.bg};background-image:url('${p.image}')`
      : `background-color:${p.bg}`;
    s.innerHTML = `<div class="pf-bg" style="${bgStyle}"></div><div class="pf-scrim"></div>`;
    sc.appendChild(s);
    const d = document.createElement('div');
    d.className = 'pf-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i);
    dc.appendChild(d);
  });
}

function updateUI() {
  const p = projects[cur];
  document.getElementById('counter').textContent =
    String(cur + 1).padStart(2, '0') + ' / ' + String(projects.length).padStart(2, '0');
  document.getElementById('slide-title').textContent = p.title;
  document.getElementById('slide-short').textContent = p.short;
  document.getElementById('slide-tags').innerHTML =
    p.tags.slice(0, 3).map(t => `<span class="pf-tag">${t}</span>`).join('');
  document.querySelectorAll('.pf-dot').forEach((d, i) => d.classList.toggle('active', i === cur));
  document.querySelectorAll('.pf-slide').forEach((s, i) => s.classList.toggle('active', i === cur));
}

function goTo(n) { cur = (n + projects.length) % projects.length; updateUI(); startTime = null; }
function go(d)   { goTo(cur + d); }

function openModal() {
  const p = projects[cur];
  paused = true;
  const hero = document.getElementById('mhero');
  hero.style.background = p.image ? `url('${p.image}') center/cover` : p.bg;
  document.getElementById('myear').textContent = p.year;
  const ms = document.getElementById('mstat');
  ms.textContent = sLabel[p.status];
  ms.className = 'mstat ' + sCls[p.status];
  document.getElementById('mtitle').textContent = p.title;
  document.getElementById('mdesc').textContent = p.desc;
  document.getElementById('mtags').innerHTML = p.tags.map(t => `<span class="pf-tag">${t}</span>`).join('');
  const ma = document.getElementById('macts');
  ma.innerHTML = '';
  if (p.live) {
    const a = document.createElement('a');
    a.href = p.live; a.target = '_blank';
    a.className = 'mabtn mbtn-p'; a.textContent = 'View Live';
    ma.appendChild(a);
  }
  if (p.github) {
    const a = document.createElement('a');
    a.href = p.github; a.target = '_blank';
    a.className = 'mabtn mbtn-g'; a.textContent = 'GitHub';
    ma.appendChild(a);
  }
  document.getElementById('mwrap').classList.add('open');
}

function closeModal() {
  document.getElementById('mwrap').classList.remove('open');
  paused = false;
  startTime = null;
}

document.getElementById('mwrap').addEventListener('click', e => {
  if (e.target === document.getElementById('mwrap')) closeModal();
});

function tick(ts) {
  if (!startTime) startTime = ts;
  if (!paused) {
    const el = ts - startTime;
    document.getElementById('progress').style.width = Math.min(el / interval * 100, 100) + '%';
    if (el >= interval) { go(1); startTime = ts; }
  }
  requestAnimationFrame(tick);
}

buildSlides();
updateUI();
requestAnimationFrame(tick);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'Escape')     closeModal();
});
</script>
</body>
</html>
