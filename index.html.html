<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #3b3b3b;
    --surface: #2a2520;
    --primary-dark: #675647;
    --primary-warm: #e3bd98;
    --neutral-tan: #dfd3b5;
    --neutral-gray: #c0bdbc;
    --accent: #6c6e36;
    --text-color: #f5f0e8;
    --text-dim: rgba(245, 240, 232, 0.5);
    --text-faint: rgba(245, 240, 232, 0.2);
    --border: rgba(245, 240, 232, 0.1);
    --border-mid: rgba(245, 240, 232, 0.22);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Nunito Sans', 'Gill Sans', 'Century Gothic', sans-serif;

    /* =====================================================
       TO USE GOTHAM FONT:
       1. Purchase Gotham from fonts.com or typography.com
       2. Place your font files in a folder called "fonts/"
          next to this HTML file
       3. Replace the font-family above with:
          font-family: 'Gotham', 'Nunito Sans', sans-serif;
       4. Add these @font-face rules at the top of this
          <style> block:

       @font-face {
         font-family: 'Gotham';
         src: url('fonts/Gotham-Book.woff2') format('woff2');
         font-weight: 400;
       }
       @font-face {
         font-family: 'Gotham';
         src: url('fonts/Gotham-Medium.woff2') format('woff2');
         font-weight: 600;
       }
       @font-face {
         font-family: 'Gotham';
         src: url('fonts/Gotham-Bold.woff2') format('woff2');
         font-weight: 700;
       }
       @font-face {
         font-family: 'Gotham';
         src: url('fonts/Gotham-Black.woff2') format('woff2');
         font-weight: 800;
       }
       ===================================================== */
  }

  .pf {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    color: var(--text-color);
    letter-spacing: 0.01em;
  }

  /* ---- SLIDES ---- */
  .pf-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.9s ease;
    pointer-events: none;
  }
  .pf-slide.active { opacity: 1; pointer-events: all; }

  .pf-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 10s ease;
  }
  .pf-slide.active .pf-bg { transform: scale(1.03); }

  .pf-scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(40, 33, 28, 0.94) 0%,
      rgba(40, 33, 28, 0.25) 55%,
      rgba(40, 33, 28, 0.5) 100%
    );
  }

  /* ---- TOP NAV ---- */
  .pf-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 1.8rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }

  .pf-logo {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--neutral-tan);
  }

  .pf-topnav { display: flex; gap: 2.2rem; }
  .pf-topnav a {
    color: var(--text-dim);
    font-size: 0.63rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }
  .pf-topnav a:hover { color: var(--neutral-tan); }

  /* ---- BOTTOM INFO ---- */
  .pf-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 2.5rem 2.5rem 2.2rem;
    z-index: 20;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .pf-info { flex: 1; min-width: 0; }

  .pf-counter {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--primary-warm);
    margin-bottom: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .pf-title {
    font-weight: 800;
    font-size: clamp(1.8rem, 4vw, 3rem);
    line-height: 1.08;
    letter-spacing: -0.01em;
    color: var(--text-color);
    margin-bottom: 0.6rem;
    cursor: pointer;
    display: inline-block;
    transition: color 0.2s;
  }
  .pf-title:hover { color: var(--neutral-tan); }

  .pf-short {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.03em;
    margin-bottom: 1rem;
    max-width: 480px;
    line-height: 1.65;
  }

  .pf-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .pf-tag {
    border: 1px solid rgba(163, 147, 119, 0.4);
    color: rgba(223, 211, 181, 0.7);
    font-size: 0.58rem;
    padding: 0.22rem 0.65rem;
    border-radius: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ---- CONTROLS ---- */
  .pf-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.9rem;
    flex-shrink: 0;
  }

  .pf-arrows { display: flex; gap: 0.5rem; }

  .pf-btn {
    width: 42px;
    height: 42px;
    border-radius: 2px;
    background: transparent;
    border: 1px solid var(--border-mid);
    color: var(--neutral-tan);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: inherit;
  }
  .pf-btn:hover { background: rgba(227, 189, 152, 0.12); border-color: var(--primary-warm); }

  .pf-dots { display: flex; gap: 6px; align-items: center; }
  .pf-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-faint);
    cursor: pointer;
    transition: all 0.3s;
  }
  .pf-dot.active { background: var(--primary-warm); width: 20px; border-radius: 2px; }

  .pf-view {
    background: transparent;
    border: 1px solid rgba(227, 189, 152, 0.35);
    color: var(--primary-warm);
    font-size: 0.6rem;
    padding: 0.6rem 1.3rem;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.2s;
  }
  .pf-view:hover { background: rgba(227, 189, 152, 0.12); border-color: var(--primary-warm); color: var(--neutral-tan); }

  /* ---- PROGRESS BAR ---- */
  .pf-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--accent);
    z-index: 30;
    transition: width 0.1s linear;
  }

  /* ---- MODAL ---- */
  .mwrap {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    background: rgba(30, 25, 20, 0.88);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .mwrap.open { opacity: 1; pointer-events: all; }

  .mbox {
    background: var(--surface);
    border: 1px solid rgba(163, 147, 119, 0.25);
    border-radius: 4px;
    max-width: 560px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    transform: translateY(14px);
    transition: transform 0.25s;
    position: relative;
  }
  .mwrap.open .mbox { transform: translateY(0); }

  .mhero {
    height: 180px;
    background-size: cover;
    background-position: center;
    border-radius: 3px 3px 0 0;
    display: flex;
    align-items: flex-end;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid rgba(163, 147, 119, 0.2);
  }
  .mhero-cat {
    font-size: 0.56rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--primary-warm);
    font-weight: 700;
  }

  .mbody { padding: 1.8rem; }

  .mmeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .myear {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .mstat {
    font-size: 0.56rem;
    padding: 0.22rem 0.65rem;
    border-radius: 2px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .sl { background: rgba(108,110,54,0.2); color: #a8ab6a; border: 1px solid rgba(108,110,54,0.35); }
  .sw { background: rgba(227,189,152,0.12); color: var(--primary-warm); border: 1px solid rgba(227,189,152,0.25); }
  .sa { background: rgba(192,189,188,0.08); color: var(--neutral-gray); border: 1px solid rgba(192,189,188,0.2); }

  .mtitle {
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
    margin-bottom: 0.85rem;
    color: var(--text-color);
  }
  .mdesc {
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.85;
    margin-bottom: 1.3rem;
    font-weight: 300;
  }
  .mtags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.5rem; }

  .macts { display: flex; gap: 0.7rem; flex-wrap: wrap; }
  .mabtn {
    font-family: inherit;
    font-size: 0.6rem;
    padding: 0.65rem 1.3rem;
    border-radius: 2px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .mbtn-p { background: var(--accent); color: var(--neutral-tan); }
  .mbtn-p:hover { background: #7e8040; }
  .mbtn-g { background: transparent; color: var(--text-dim); border: 1px solid var(--border-mid); }
  .mbtn-g:hover { color: var(--neutral-tan); border-color: rgba(245,240,232,0.4); }

  .mclose {
    position: absolute;
    top: 0.9rem; right: 0.9rem;
    width: 30px; height: 30px;
    border-radius: 2px;
    background: transparent;
    border: 1px solid var(--border-mid);
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: inherit;
  }
  .mclose:hover { background: rgba(227,189,152,0.1); color: var(--neutral-tan); }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 600px) {
    .pf-top, .pf-bottom { padding-left: 1.2rem; padding-right: 1.2rem; }
    .pf-topnav { gap: 1.2rem; }
    .pf-bottom { flex-direction: column; align-items: flex-start; }
    .pf-right { flex-direction: row; align-items: center; flex-wrap: wrap; }
    .mbody { padding: 1.2rem; }
  }
</style>
</head>
<body>

<div class="pf" id="pf">
  <div id="slides"></div>

  <div class="pf-top">
    <!--
      CHANGE "Your Name" below to your actual name or logo text.
      You can also replace this with an <img> tag pointing to your logo file.
    -->
    <div class="pf-logo">Your Name</div>
    <nav class="pf-topnav">
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </div>

  <div class="pf-bottom">
    <div class="pf-info">
      <div class="pf-counter" id="counter">01 / 06</div>
      <div class="pf-title" id="slide-title" onclick="openModal()"></div>
      <div class="pf-short" id="slide-short"></div>
      <div class="pf-tags" id="slide-tags"></div>
    </div>
    <div class="pf-right">
      <button class="pf-view" onclick="openModal()">View Project &rarr;</button>
      <div class="pf-arrows">
        <button class="pf-btn" onclick="go(-1)">&#8592;</button>
        <button class="pf-btn" onclick="go(1)">&#8594;</button>
      </div>
      <div class="pf-dots" id="dots"></div>
    </div>
  </div>

  <div class="pf-progress" id="progress"></div>

  <div class="mwrap" id="mwrap">
    <div class="mbox">
      <button class="mclose" onclick="closeModal()">&#215;</button>
      <div class="mhero" id="mhero"><span class="mhero-cat">Project Overview</span></div>
      <div class="mbody">
        <div class="mmeta">
          <span class="myear" id="myear"></span>
          <span class="mstat" id="mstat"></span>
        </div>
        <div class="mtitle" id="mtitle"></div>
        <div class="mdesc" id="mdesc"></div>
        <div class="mtags" id="mtags"></div>
        <div class="macts" id="macts"></div>
      </div>
    </div>
  </div>
</div>

<script>
/*
  ================================================================
  HOW TO EDIT YOUR PROJECTS
  ================================================================
  Each project below has these fields:

  title      — The big headline name of your project
  short      — One sentence shown on the slideshow
  desc       — Longer description shown in the popup modal
  tags       — Tech/skills used (shows first 3 on slide, all in modal)
  year       — Year completed
  status     — "live", "wip" (in progress), or "archived"
  bg         — Background color of the slide (dark hex color)
  live       — URL to the live project. Use null if none.
  github     — URL to GitHub repo. Use null if none.
  image      — Path to a background image (optional).
               Example: "images/project1.jpg"
               Leave as null to use only the bg color.

  TO ADD YOUR OWN IMAGES:
  1. Create a folder called "images" next to this HTML file
  2. Put your project photos in that folder
  3. Set the image field to "images/your-photo.jpg"
  ================================================================
*/
const projects = [
  {
    title: "E-Commerce Dashboard",
    short: "Real-time analytics and inventory tracking for an online retail platform.",
    desc: "A full-stack analytics dashboard for a mid-size e-commerce company. Features real-time inventory alerts, revenue forecasting, and a customer drop-off heatmap. Cut order processing time by 34%.",
    tags: ["React", "Node.js", "PostgreSQL", "D3.js"],
    year: "2025",
    status: "live",
    bg: "#3a2e26",
    image: null,
    live: "https://yourproject.com",
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Design System",
    short: "Component library and token system spanning three products.",
    desc: "80+ components, full token architecture covering spacing, color, and typography, plus a Figma integration pipeline. Reduced UI inconsistencies across the product suite by 60% within one quarter.",
    tags: ["TypeScript", "Storybook", "Figma", "CSS Custom Properties"],
    year: "2024",
    status: "live",
    bg: "#2e2b25",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "AI Writing Assistant",
    short: "Browser extension that brings AI writing into any text field.",
    desc: "A Chrome extension injecting a contextual AI assistant into any textarea on the web. Supports tone adjustment, grammar fixing, and smart completions. Reached 2,000 active weekly users within two months.",
    tags: ["JavaScript", "Chrome API", "OpenAI", "Tailwind"],
    year: "2024",
    status: "live",
    bg: "#2c3028",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Real-time Collab Tool",
    short: "Infinite canvas whiteboard with live cursors and voice chat.",
    desc: "Collaborative canvas built with WebSockets and CRDT-based state sync. Supports freehand drawing, sticky notes, shapes, and live cursors for up to 20 concurrent users, plus WebRTC voice.",
    tags: ["WebSockets", "CRDT", "WebRTC", "Canvas API"],
    year: "2025",
    status: "wip",
    bg: "#35302a",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Personal Finance App",
    short: "Mobile-first budgeting with smart categorization and insights.",
    desc: "React Native app pulling bank transactions via Plaid, auto-categorizing spending using a lightweight ML model trained on 500k labeled transactions, with drill-down monthly trend charts.",
    tags: ["React Native", "Plaid API", "TensorFlow Lite", "SQLite"],
    year: "2023",
    status: "archived",
    bg: "#302d2b",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  },
  {
    title: "Open Source CLI",
    short: "Scaffold full-stack projects with a single command line.",
    desc: "A Node.js CLI generating opinionated full-stack project scaffolds. Supports React, Vue, and Svelte frontends paired with Express or Fastify backends. Over 1,200 GitHub stars.",
    tags: ["Node.js", "CLI", "Yargs", "Handlebars"],
    year: "2024",
    status: "live",
    bg: "#2a2e26",
    image: null,
    live: null,
    github: "https://github.com/yourusername/project"
  }
];

/* ---- Don't need to edit below this line ---- */
const sLabel = { live: "Live", wip: "In Progress", archived: "Archived" };
const sCls   = { live: "sl",   wip: "sw",          archived: "sa" };
let cur = 0, paused = false, startTime = null, interval = 5500;

function buildSlides() {
  const sc = document.getElementById('slides');
  const dc = document.getElementById('dots');
  projects.forEach((p, i) => {
    const s = document.createElement('div');
    s.className = 'pf-slide' + (i === 0 ? ' active' : '');
    const bgStyle = p.image
      ? `background-color:${p.bg};background-image:url('${p.image}')`
      : `background-color:${p.bg}`;
    s.innerHTML = `<div class="pf-bg" style="${bgStyle}"></div><div class="pf-scrim"></div>`;
    sc.appendChild(s);
    const d = document.createElement('div');
    d.className = 'pf-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i);
    dc.appendChild(d);
  });
}

function updateUI() {
  const p = projects[cur];
  document.getElementById('counter').textContent =
    String(cur + 1).padStart(2, '0') + ' / ' + String(projects.length).padStart(2, '0');
  document.getElementById('slide-title').textContent = p.title;
  document.getElementById('slide-short').textContent = p.short;
  document.getElementById('slide-tags').innerHTML =
    p.tags.slice(0, 3).map(t => `<span class="pf-tag">${t}</span>`).join('');
  document.querySelectorAll('.pf-dot').forEach((d, i) => d.classList.toggle('active', i === cur));
  document.querySelectorAll('.pf-slide').forEach((s, i) => s.classList.toggle('active', i === cur));
}

function goTo(n) { cur = (n + projects.length) % projects.length; updateUI(); startTime = null; }
function go(d)   { goTo(cur + d); }

function openModal() {
  const p = projects[cur];
  paused = true;
  const hero = document.getElementById('mhero');
  hero.style.background = p.image ? `url('${p.image}') center/cover` : p.bg;
  document.getElementById('myear').textContent = p.year;
  const ms = document.getElementById('mstat');
  ms.textContent = sLabel[p.status];
  ms.className = 'mstat ' + sCls[p.status];
  document.getElementById('mtitle').textContent = p.title;
  document.getElementById('mdesc').textContent = p.desc;
  document.getElementById('mtags').innerHTML = p.tags.map(t => `<span class="pf-tag">${t}</span>`).join('');
  const ma = document.getElementById('macts');
  ma.innerHTML = '';
  if (p.live) {
    const a = document.createElement('a');
    a.href = p.live; a.target = '_blank';
    a.className = 'mabtn mbtn-p'; a.textContent = 'View Live';
    ma.appendChild(a);
  }
  if (p.github) {
    const a = document.createElement('a');
    a.href = p.github; a.target = '_blank';
    a.className = 'mabtn mbtn-g'; a.textContent = 'GitHub';
    ma.appendChild(a);
  }
  document.getElementById('mwrap').classList.add('open');
}

function closeModal() {
  document.getElementById('mwrap').classList.remove('open');
  paused = false;
  startTime = null;
}

document.getElementById('mwrap').addEventListener('click', e => {
  if (e.target === document.getElementById('mwrap')) closeModal();
});

function tick(ts) {
  if (!startTime) startTime = ts;
  if (!paused) {
    const el = ts - startTime;
    document.getElementById('progress').style.width = Math.min(el / interval * 100, 100) + '%';
    if (el >= interval) { go(1); startTime = ts; }
  }
  requestAnimationFrame(tick);
}

buildSlides();
updateUI();
requestAnimationFrame(tick);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'Escape')     closeModal();
});
</script>
</body>
</html>
